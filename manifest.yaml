# Vantage extension manifest — consumed by the ExtensionManager
# (backend/services/extensions/manifest.py) during install.
#
# Schema matches PRD §Extensions Platform (socc-copilot-plugin.md,
# lines 212–247). The parser validates every field against a strict
# pydantic schema; no arbitrary shell, no host mounts, no env-var
# expansion beyond the declared `secrets` + `settings`.

id: socc
name: SOC Copilot
description: Conversational LLM assistant for threat triage.
version: 0.1.0
compose_file: ./compose.yml

# Ops exposed in the UI. Order = order of display.
operations: [install, start, stop, restart, logs, uninstall]

# Health endpoint hit by the backend via the internal Docker network.
health:
  url: http://socc-copilot:7070/v1/health
  interval_seconds: 15
  timeout_seconds: 3

# Secrets the installer generates/provisions. `random_bytes_base64` is
# the ExtensionManager-side generator; length is in bytes.
secrets:
  - name: SOCC_MASTER_KEY
    generator: random_bytes_base64
    length: 32
  - name: SOCC_INTERNAL_SECRET
    generator: random_bytes_base64
    length: 32

# Pre-flight checks enforced before Install is allowed.
requires:
  docker_socket_proxy: true
  disk_space_mb: 512
  ports: []          # nothing exposed to the host

# Admin-editable flags surfaced in the extension's Settings modal.
settings:
  - key: SOCC_ALLOW_LOCAL_PROVIDERS
    type: boolean
    default: false
    label: "Permitir provedores locais (Ollama)"

# Uninstall behavior. The confirm phrase must be typed literally in the
# destructive modal.
uninstall:
  destroy_volumes_by_default: true
  confirm_phrase: "uninstall socc"
