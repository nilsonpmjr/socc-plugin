name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout socc-plugin
        uses: actions/checkout@v4
        with:
          path: socc-plugin

      # socc-plugin depends on `file:../socc` during development. Until a
      # registry release exists, we clone the sibling repo into place.
      - name: Checkout sibling socc
        uses: actions/checkout@v4
        with:
          repository: vantagesec/socc
          path: socc
          # No token needed for public repos; add one here if socc is
          # private in this org.

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install deps
        working-directory: socc-plugin
        run: bun install --frozen-lockfile || bun install

      - name: Typecheck
        working-directory: socc-plugin
        run: bun run typecheck

      - name: Guard headless imports
        working-directory: socc-plugin
        run: bun run guard:headless-imports

      # Split unit and integration tests into separate runs. The Bun
      # 1.3.12 runtime occasionally crashes when many Workers are spun
      # up across files in a single process; running them in two passes
      # avoids that flake.
      - name: Test (unit)
        working-directory: socc-plugin
        run: bun run test:unit

      - name: Test (integration)
        working-directory: socc-plugin
        run: bun run test:integration

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout socc-plugin
        uses: actions/checkout@v4
        with:
          path: socc-plugin

      - name: Checkout sibling socc
        uses: actions/checkout@v4
        with:
          repository: vantagesec/socc
          path: socc

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image from the parent directory so the Dockerfile can
      # COPY both socc/ and socc-plugin/.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: socc-plugin/Dockerfile
          push: false
          load: true
          tags: socc-plugin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for high/critical CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: socc-plugin:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true

      - name: Smoke boot
        # Runs the image with dummy Mongo — expects it to fail fast at
        # connect() rather than crash during bootstrap. A successful exit
        # code here means the bundle is valid JS and libsodium/jose load.
        run: |
          docker run --rm --name socc-ci \
            -e MONGO_URI=mongodb://nope:27017 \
            -e SOCC_INTERNAL_SECRET=$(openssl rand -hex 32) \
            -e SOCC_MASTER_KEY=$(openssl rand -hex 32) \
            socc-plugin:ci 2>&1 | head -80 | tee /tmp/boot.log &
          sleep 8
          docker kill socc-ci 2>/dev/null || true
          grep -q 'MongoServerSelectionError\|ENOTFOUND' /tmp/boot.log
