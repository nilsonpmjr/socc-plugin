# Local dev stack for socc-plugin.
#
# Usage:
#   cd scratch/socc-plugin
#   cp .env.example .env    # fill in SOCC_INTERNAL_SECRET + SOCC_MASTER_KEY
#   docker compose up --build
#
# Generate fresh secrets with:
#   openssl rand -hex 32   # for each secret

services:
  socc-plugin:
    build:
      # Context is the parent so the Dockerfile can COPY ../socc.
      context: ..
      dockerfile: socc-plugin/Dockerfile
    image: socc-plugin:local
    restart: unless-stopped
    ports:
      - "7070:7070"
    environment:
      PORT: 7070
      MONGO_URI: mongodb://socc-mongo:27017
      MONGO_DB: socc_plugin
      SOCC_INTERNAL_SECRET: ${SOCC_INTERNAL_SECRET:?set SOCC_INTERNAL_SECRET in .env}
      SOCC_MASTER_KEY: ${SOCC_MASTER_KEY:?set SOCC_MASTER_KEY in .env}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-900000}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS:-50}
      TURN_TIMEOUT_MS: ${TURN_TIMEOUT_MS:-90000}
      SOCC_ALLOW_LOCAL_PROVIDERS: ${SOCC_ALLOW_LOCAL_PROVIDERS:-false}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-30}
      VANTAGE_API_URL: ${VANTAGE_API_URL:-}
      OPENAI_CODEX_OAUTH_CLIENT_ID: ${OPENAI_CODEX_OAUTH_CLIENT_ID:-}
      OPENAI_CODEX_OAUTH_REDIRECT_URI: ${OPENAI_CODEX_OAUTH_REDIRECT_URI:-}
      OPENAI_CODEX_OAUTH_AUTHORIZE_URL: ${OPENAI_CODEX_OAUTH_AUTHORIZE_URL:-https://auth.openai.com/oauth/authorize}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - vantage_internal
    depends_on:
      socc-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7070/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  socc-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - socc-mongo-data:/data/db
    networks:
      - vantage_internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  socc-mongo-data:

networks:
  vantage_internal:
    name: threat-intelligence-tool_vantage_internal
    external: true
